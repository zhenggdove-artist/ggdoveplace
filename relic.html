<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relic — GGdove</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <nav id="main-nav"></nav>
    <h2 class="page-title">Relic</h2>

    <!-- Works section -->
    <div class="gallery-grid" id="projects-grid"></div>
    <div class="load-more-wrap">
      <button class="btn-load-more" id="btn-load-more">Load More</button>
    </div>

    <!-- Divider -->
    <hr class="relic-divider">

    <!-- Weapons section -->
    <div class="weapons-grid" id="weapons-grid"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">×</button>
    <button class="lightbox-prev" id="lb-prev">‹</button>
    <button class="lightbox-next" id="lb-next">›</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lb-img" src="" alt="">
      <div class="lightbox-info" id="lb-info"></div>
    </div>
  </div>

  <footer><p>© GGdove</p></footer>
  <script src="js/vhs-effect.js"></script>
  <script src="js/main.js"></script>
  <script>
    loadData().then(() => {
      renderHeader('relic');
      initLightbox();
      renderRelic();
      initVHS();

      applyTextStyles(siteData.site);
      applyZalgo(siteData.site);
      applyBackground(siteData.site);
    });
  </script>
</body>
</html>
