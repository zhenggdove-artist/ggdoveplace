<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager — GGdove</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  // ── Inject site CSS into preview iframe ──
  CMS.registerPreviewStyle('https://zhenggdove-artist.github.io/ggdoveplace/css/style.css');
  CMS.registerPreviewStyle([
    ':root{--bg:#06030f;--bg-2:#0d0820;--bg-3:#110d28;',
    '--text:#c8c0e8;--text-bright:#eee8ff;--text-dim:#6a6080;',
    '--accent:#7755ff;--accent-dim:#4433bb;--accent-glow:rgba(120,90,255,0.35);',
    '--border:#1e1840;--serif:"Georgia",serif;--mono:"Courier New",monospace;}',
    'body{background:var(--bg);color:var(--text);font-family:var(--serif);margin:0;padding:1rem 2rem;}',
    'h2.page-title{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.25em;',
    'text-transform:uppercase;color:var(--text-dim);margin:1.5rem 0 1.2rem;font-weight:400;}'
  ].join(''), { raw: true });

  // ── Zalgo engine (for CMS preview) ──────────────────────
  var ZU = ['\u030d','\u030e','\u0304','\u0305','\u033f','\u0311','\u0306','\u0310','\u0352','\u0357','\u0351','\u0307','\u0308','\u030a','\u0342','\u0343','\u0344','\u034a','\u034b','\u034c','\u0303','\u0302','\u030c','\u0350','\u0300','\u0301','\u030b','\u030f','\u0312','\u0313','\u0314','\u033d','\u0309','\u0363','\u0364','\u0365','\u0366','\u0367','\u0368','\u0369','\u036a','\u036b','\u036c','\u036d','\u036e','\u036f','\u033e','\u035b','\u0346','\u031a'];
  var ZM = ['\u0315','\u031b','\u0340','\u0341','\u0358','\u0321','\u0322','\u0327','\u0328','\u0334','\u0335','\u0336','\u034f','\u035c','\u035d','\u035e','\u0360','\u0362','\u0338','\u0337','\u0361','\u0489'];
  var ZD = ['\u0316','\u0317','\u0318','\u0319','\u031c','\u031d','\u031e','\u031f','\u0320','\u0324','\u0325','\u0326','\u0329','\u032a','\u032b','\u032c','\u032d','\u032e','\u032f','\u0330','\u0331','\u0332','\u0333','\u0339','\u033a','\u033b','\u033c','\u0345','\u0347','\u0348','\u0349','\u034d','\u034e','\u0353','\u0354','\u0355','\u0356','\u0359','\u035a','\u0323'];

  function generateZalgo(text, up, mid, down, intensity) {
    var maxM = Math.ceil(intensity * 15);
    var minM = Math.max(1, Math.floor(intensity * 3));
    var rnd  = function(a) { return a[Math.floor(Math.random() * a.length)]; };
    var rndN = function(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; };
    var out = '';
    for (var i = 0; i < text.length; i++) {
      out += text[i];
      if (/\s/.test(text[i])) continue;
      if (text.charCodeAt(i) >= 0x2E80) continue; // skip CJK
      if (up)   for (var j = rndN(minM, maxM); j--;) out += rnd(ZU);
      if (mid)  for (var j = rndN(minM, maxM); j--;) out += rnd(ZM);
      if (down) for (var j = rndN(minM, maxM); j--;) out += rnd(ZD);
    }
    return out;
  }

  // ── Utility: hex #rrggbb → rgba(r,g,b,a) ──────────────
  function hexToRgba(hex, alpha) {
    if (!hex || hex.length < 7) return 'rgba(0,0,0,' + alpha + ')';
    var r = parseInt(hex.slice(1,3), 16) || 0;
    var g = parseInt(hex.slice(3,5), 16) || 0;
    var b = parseInt(hex.slice(5,7), 16) || 0;
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ── Works Preview ─────────────────────────────
  var WorksPreview = createClass({
    render: function() {
      var entry    = this.props.entry;
      var projects = entry.getIn(['data', 'projects']);
      if (!projects) {
        return h('div', { style: { padding: '2rem', color: '#6a6080', fontFamily: 'monospace', fontSize: '0.8rem' } },
          'No projects yet.');
      }
      var list = projects.toJS ? projects.toJS() : [];
      return h('div', null,
        h('h2', { className: 'page-title' }, 'Works — Live Preview'),
        h('div', { className: 'gallery-grid layout-grid size-medium', style: { marginTop: '1rem' } },
          list.map(function(p, i) {
            return h('div', { key: i, className: 'gallery-item' },
              h('img', {
                src: p.image || '',
                alt: p.title || ('Work ' + (p.id || (i + 1))),
                loading: 'lazy',
                style: { width: '100%', aspectRatio: '4/3', objectFit: 'cover', background: '#110d28', display: 'block' }
              }),
              h('div', { className: 'gallery-caption' },
                h('h3', null, p.title || ''),
                h('p', null, [p.year, p.medium].filter(Boolean).join('  \xb7  '))
              )
            );
          })
        )
      );
    }
  });
  CMS.registerPreviewTemplate('projects', WorksPreview);
  CMS.registerPreviewTemplate('works', WorksPreview);

  // ── Weapons Preview ───────────────────────────
  var WeaponsPreview = createClass({
    render: function() {
      var entry   = this.props.entry;
      var weapons = entry.getIn(['data', 'weapons']);
      if (!weapons) return h('div', { style: { padding: '2rem', color: '#6a6080', fontFamily: 'monospace', fontSize: '0.8rem' } }, 'No weapons yet.');
      var list = weapons.toJS ? weapons.toJS() : [];
      return h('div', null,
        h('h2', { className: 'page-title' }, 'Weapons — Live Preview'),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '1.4rem', marginTop: '1rem' } },
          list.map(function(w, i) {
            return h('div', { key: i, style: { background: '#0d0820', overflow: 'hidden' } },
              h('img', { src: w.image || '', alt: w.name || '', loading: 'lazy',
                style: { width: '100%', aspectRatio: '1/1', objectFit: 'cover', display: 'block', background: '#110d28' } }),
              h('div', { style: { padding: '0.6rem 0.7rem' } },
                h('div', { style: { color: '#eee8ff', fontFamily: 'Georgia,serif', fontSize: '0.9rem' } }, w.name || ''),
                w.price ? h('div', { style: { color: '#7755ff', fontFamily: 'Courier New,monospace', fontSize: '0.72rem', marginTop: '0.2rem' } }, w.price) : null
              )
            );
          })
        )
      );
    }
  });
  CMS.registerPreviewTemplate('weapons', WeaponsPreview);
  CMS.registerPreviewTemplate('weapons_data', WeaponsPreview);

  // ── Bio Preview ───────────────────────────────
  var BioPreview = createClass({
    render: function() {
      var entry = this.props.entry;
      var bio   = entry.getIn(['data', 'bio']);
      if (!bio) return h('div', null, 'No bio data.');
      var b = bio.toJS ? bio.toJS() : bio;
      return h('div', { style: { display: 'flex', gap: '2rem', alignItems: 'flex-start', flexWrap: 'wrap', padding: '1rem 0' } },
        h('img', { src: b.photo || '', alt: b.name || '',
          style: { width: '220px', height: '280px', objectFit: 'cover', background: '#110d28', flexShrink: 0 } }),
        h('div', { style: { flex: 1, minWidth: '200px' } },
          h('h1', { style: { fontFamily: 'Georgia,serif', fontSize: '1.8rem', fontWeight: 400, color: '#eee8ff', margin: '0 0 0.3rem' } }, b.name || ''),
          h('p',  { style: { fontFamily: 'Courier New,monospace', fontSize: '0.72rem', color: '#7755ff', letterSpacing: '0.12em', margin: '0 0 1rem' } }, b.subtitle || ''),
          h('p',  { style: { lineHeight: 1.75, color: '#c8c0e8', fontSize: '0.92rem' } }, b.text || '')

  CMS.registerPreviewTemplate('bio_data', BioPreview);

  // ── Contact Preview ───────────────────────────
  var ContactPreview = createClass({
    render: function() {
      var entry   = this.props.entry;
      var contact = entry.getIn(['data', 'contact']);
      if (!contact) return h('div', null, 'No contact data.');
      var c = contact.toJS ? contact.toJS() : contact;

        h('img', { src: c.image || '', alt: 'Contact',

        h('div', { style: { flex: 1, minWidth: '200px', fontFamily: 'Courier New,monospace', fontSize: '0.82rem', lineHeight: 2 } },
          h('h2', { style: { color: '#eee8ff', fontFamily: 'Georgia,serif', fontWeight: 400, margin: '0 0 1rem' } }, 'Get in Touch'),
          c.email     ? h('div', null, h('span', { style: { color: '#6a6080' } }, 'Email: '),    h('span', { style: { color: '#7755ff' } }, c.email)) : null,
          c.instagram ? h('div', null, h('span', { style: { color: '#6a6080' } }, 'IG: '),       h('span', { style: { color: '#7755ff' } }, c.instagram)) : null,
          c.location  ? h('div', null, h('span', { style: { color: '#6a6080' } }, 'Location: '), h('span', { style: { color: '#c8c0e8' } }, c.location)) : null
        )
      );
    }
  });
  CMS.registerPreviewTemplate('contact', ContactPreview);
  CMS.registerPreviewTemplate('contact_data', ContactPreview);

  // ── Site Settings Preview ─────────────────────
  var SiteSettingsPreview = createClass({
    getInitialState: function() { return { zalgoTick: 0 }; },
    componentDidMount: function() {
      var self = this;
      self._zt = setInterval(function() { self.setState(function(s) { return { zalgoTick: s.zalgoTick + 1 }; }); }, 2200);
    },
    componentWillUnmount: function() { clearInterval(this._zt); },
    render: function() {
      var entry = this.props.entry;
      var site  = entry.getIn(['data', 'site']);
      if (!site) return h('div', null, 'No site settings.');
      var s = site.toJS ? site.toJS() : site;

      var layoutLabel  = { grid: 'Grid 方格', masonry: 'Masonry 瀑布流', slideshow: 'Slideshow 幻燈片' };
      var sizeLabel    = { small: 'Small 小', medium: 'Medium 中', large: 'Large 大' };
      var captionLabel = { below: 'Below 下方', overlay: 'Overlay 疊加 (hover)', hidden: 'Hidden 隱藏' };
      var hoverLabel   = { scale: 'Scale 放大', brighten: 'Brighten 增亮', glow: 'Glow 發光', none: 'None 無' };
      var animLabel    = { none: 'None 無', 'fade-up': 'Fade Up ↑', 'fade-in': 'Fade In 淡入', 'zoom-in': 'Zoom In 放大', 'slide-left': '← Slide Left', 'slide-right': 'Slide Right →' };
      var speedLabel   = { slow: 'Slow 慢 (0.8s)', normal: 'Normal 中 (0.5s)', fast: 'Fast 快 (0.3s)' };

      var headingCssMap = {
        georgia:     'Georgia, serif',
        playfair:    '"Playfair Display", serif',
        cormorant:   '"Cormorant Garamond", serif',
        garamond:    '"EB Garamond", serif',
        lora:        '"Lora", serif',
        baskerville: '"Libre Baskerville", serif'
      };
      var accentCssMap = {
        'courier-new':   '"Courier New", monospace',
        'space-mono':    '"Space Mono", monospace',
        'ibm-plex-mono': '"IBM Plex Mono", monospace',
        'courier-prime': '"Courier Prime", monospace'
      };
      var fonts = s.fonts || {};
      var headingFont = headingCssMap[fonts.heading] || 'Georgia, serif';
      var accentFont  = accentCssMap[fonts.accent]   || '"Courier New", monospace';

      var row = function(label, val, color) {
        return h('div', { style: { display: 'flex', gap: '0.8rem', padding: '0.28rem 0', borderBottom: '1px solid #1e1840' } },
          h('span', { style: { color: '#6a6080', minWidth: '150px', fontFamily: '"Courier New",monospace', fontSize: '0.76rem' } }, label),
          h('span', { style: { color: color || '#c8c0e8', fontFamily: '"Courier New",monospace', fontSize: '0.76rem' } }, val || '—')
        );
      };

      return h('div', null,
        h('h2', { className: 'page-title' }, 'Site Settings — Live Preview'),
        h('div', { style: { background: '#0d0820', padding: '1.4rem', border: '1px solid #1e1840', marginBottom: '1.2rem' } },
          row('Title', s.title, '#eee8ff'),
          row('Subtitle', s.subtitle),
          row('Gallery Layout', layoutLabel[s.galleryLayout] || s.galleryLayout, '#7755ff'),
          row('Image Size', sizeLabel[s.imageSize] || s.imageSize, '#7755ff'),
          row('Caption Style', captionLabel[s.captionStyle] || s.captionStyle, '#7755ff'),
          row('Image Aspect', s.imageAspect, '#7755ff'),
          row('Gallery Gap', s.galleryGap, '#7755ff'),
          row('Hover Effect', hoverLabel[s.hoverEffect] || s.hoverEffect, '#7755ff'),
          row('Scroll Anim', animLabel[s.scrollAnim] || s.scrollAnim, '#55ddaa'),
          row('Anim Speed', speedLabel[s.animSpeed] || s.animSpeed, '#55ddaa'),
          row('Stagger', s.animStagger ? 'On \u2713' : 'Off', s.animStagger ? '#55ff99' : '#6a6080')
        ),
        // Font preview block
        h('div', { style: { background: '#0d0820', padding: '1.4rem', border: '1px solid #1e1840', marginBottom: '1.2rem' } },
          h('div', { style: { color: '#6a6080', fontFamily: '"Courier New",monospace', fontSize: '0.66rem', letterSpacing: '0.18em', textTransform: 'uppercase', marginBottom: '1rem' } }, 'Typography Preview'),
          h('p', { style: { fontFamily: headingFont, fontSize: '1.8rem', fontWeight: 400, color: '#eee8ff', margin: '0 0 0.3rem', letterSpacing: '0.04em' } },
            '\u9102\u541b\u670b  Zheng Jun Peng'),
          h('p', { style: { fontFamily: accentFont, fontSize: '0.72rem', color: '#7755ff', letterSpacing: '0.16em', textTransform: 'uppercase', margin: '0 0 1.2rem' } },
            'Artist  \xb7  2025  \xb7  Mixed Media'),
          h('p', { style: { fontFamily: headingFont, fontSize: '0.95rem', color: '#c8c0e8', lineHeight: 1.8 } },
            '\u5c55\u89bd\u5176\u8da8\u52bf\u8207\u5be6\u8e10\uff0c\u63a7\u88fd\u4e00\u500b\u7d50\u69cb\u6e05\u6670\u7684\u7531\u5167\u800c\u5916\u7684\u5275\u4f5c\u7cfb\u7d71\u3002')
        ),

        // ── Zalgo live preview block ──
        (function() {
          var zCfg = s.zalgoEffect || {};
          var zEnabled = zCfg.enabled !== false && zCfg.enabled !== 'false';
          var zIntensity = isNaN(Number(zCfg.intensity)) ? 0.3 : Number(zCfg.intensity);
          var zUp   = zCfg.up !== false && zCfg.up !== 'false';
          var zMid  = zCfg.mid === true || zCfg.mid === 'true';
          var zDown = zCfg.down === true || zCfg.down === 'true';
          // interval now in seconds (fallback 2.5s if old ms value > 100)
          var zIntervalSec = isNaN(Number(zCfg.interval)) ? 2.5
                           : Number(zCfg.interval) >= 100 ? Number(zCfg.interval) / 1000
                           : Number(zCfg.interval);

          // Generate sample texts (re-runs every zalgoTick re-render)
          var samples = zEnabled ? [
            generateZalgo('GGdove', zUp, zMid, zDown, zIntensity),
            generateZalgo('WORKS', zUp, zMid, zDown, zIntensity),
            generateZalgo('\u9102\u541b\u670b', zUp, zMid, zDown, zIntensity),
            generateZalgo('Bio', zUp, zMid, zDown, zIntensity),
            generateZalgo('Contact', zUp, zMid, zDown, zIntensity)
          ] : ['GGdove', 'WORKS', '\u9102\u541b\u670b', 'Bio', 'Contact'];

          var markerCol = zEnabled ? '#ff4466' : '#6a6080';
          var statusTxt = zEnabled
            ? ('ON  \u2502  intensity ' + zIntensity.toFixed(2) + '  \u2502  '
              + (zUp ? 'UP ' : '') + (zMid ? 'MID ' : '') + (zDown ? 'DOWN' : ''))
            : 'DISABLED';

          return h('div', { style: { background: '#08040f', padding: '1.4rem', border: '1px solid ' + (zEnabled ? '#3a1840' : '#1e1840') } },
            // Header row
            h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.2rem' } },
              h('div', { style: { color: '#6a6080', fontFamily: '"Courier New",monospace', fontSize: '0.66rem', letterSpacing: '0.18em', textTransform: 'uppercase' } },
                'Z\u0327\u034ba\u0366l\u0308g\u034ao\u0309 Preview'),
              h('div', { style: { color: markerCol, fontFamily: '"Courier New",monospace', fontSize: '0.62rem', letterSpacing: '0.1em' } }, statusTxt)
            ),
            // Sample heading rows
            h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '2rem 3rem', lineHeight: 3.5, overflow: 'visible' } },
              samples.map(function(txt, i) {
                var sizes  = ['1.8rem', '0.9rem', '1.5rem', '0.9rem', '0.9rem'];
                var colors = ['#eee8ff', '#7755ff', '#eee8ff', '#7755ff', '#7755ff'];
                return h('span', { key: i, style: {
                  fontFamily: headingFont,
                  fontSize:   sizes[i],
                  color:      colors[i],
                  fontWeight: 400,
                  letterSpacing: '0.04em',
                  display: 'inline-block',
                  overflow: 'visible'
                }}, txt);
              })
            ),
            // Subtle note
            h('div', { style: { marginTop: '0.8rem', color: '#3a3060', fontFamily: '"Courier New",monospace', fontSize: '0.6rem', letterSpacing: '0.1em' } },
              zEnabled
                ? '\u21bb re\u2010randomises every 2.2s in this preview  \xb7  website interval: ' + zIntervalSec.toFixed(2) + 's'
                : 'Enable the toggle above to activate Zalgo effect on live site'
            )
          );
        })()
      );
    }
  });
  CMS.registerPreviewTemplate('site_settings', SiteSettingsPreview);
  CMS.registerPreviewTemplate('settings', SiteSettingsPreview);

  // ── VHS Visual Effect Preview ────────────────────────────────────
  // Faithfully mirrors vhs-effect.js layer stack (z-order):
  //   photo (untouched)
  //   vhs-edge   box-shadow inset — NO backdropFilter (removed in real engine)
  //   vhs-tint   flat color, normal opacity — NO blend mode
  //   vhs-vignette  radial-gradient ellipse 76%×72%, opacity=vignetteOpacity
  //   vhs-canvas (screen blend): glow, grain, scanlines, chromatic, artifacts, rolling bar
  // ────────────────────────────────────────────────────────────────
  var VHSPreview = createClass({
    getInitialState: function() {
      return { tick: 0, barY: -55, barActive: false, barOp: 0.5, barH: 25 };
    },
    componentDidMount: function() {
      var self = this;
      self._t = 0; self._barY = -55; self._barActive = false;
      self._barTimer = 0; self._barOp = 0.5; self._barH = 25; self._barSpd = 3;
      self._iv = setInterval(function() {
        self._t++;
        self._barTimer++;
        if (!self._barActive && self._barTimer > 110 + ((self._t * 73) % 110)) {
          self._barActive = true;
          self._barY   = -55;
          self._barH   = 22 + ((self._t * 37) % 28);
          self._barOp  = 0.38 + ((self._t * 13) % 100) / 370;
          self._barSpd = 2.2 + ((self._t * 19) % 100) / 28;
          self._barTimer = 0;
        }
        if (self._barActive) {
          self._barY += self._barSpd;
          if (self._barY > 115) self._barActive = false;
        }
        self.setState({ tick: self._t, barY: self._barY, barActive: self._barActive,
                        barOp: self._barOp, barH: self._barH });
      }, 100);
    },
    componentWillUnmount: function() { clearInterval(this._iv); },
    render: function() {
      var entry = this.props.entry;

      // Read params — defaults match vhs-effect.js defaults object
      var enabled    = entry.getIn(['data', 'enabled']) !== false;
      var vigOp      = +(entry.getIn(['data', 'vignetteOpacity'])     || 0.82);
      var vigColor   =   entry.getIn(['data', 'vignetteColor'])       || '#030010';
      var overCol    =   entry.getIn(['data', 'overlayColor'])        || '#06011a';
      var overOp     = +(entry.getIn(['data', 'overlayOpacity'])      || 0.12);
      var edgeSize   = +(entry.getIn(['data', 'edgeBlurSize'])        || 65);
      var rollingBar =   entry.getIn(['data', 'rollingBarEnabled'])  !== false;
      var grainOp    = +(entry.getIn(['data', 'grainOpacity'])        || 0.075);
      var scanOp     = +(entry.getIn(['data', 'scanlinesOpacity'])    || 0.13);
      var scanSpc    = +(entry.getIn(['data', 'scanlinesSpacing'])    || 3);
      var artOp      = +(entry.getIn(['data', 'artifactsOpacity'])    || 0.38);
      var glowInt    = +(entry.getIn(['data', 'glowIntensity'])       || 1.50);
      var glowCol    =   entry.getIn(['data', 'glowColor'])           || '#5522ff';
      var chromAb    = +(entry.getIn(['data', 'chromaticAberration']) || 2.2);

      var tick = this.state.tick, barY = this.state.barY;
      var barActive = this.state.barActive, barOp = this.state.barOp, barH = this.state.barH;

      var sampleImg = 'https://zhenggdove-artist.github.io/ggdoveplace/images/project-01.jpg';
      var abs = { position: 'absolute', inset: 0, pointerEvents: 'none' };

      if (!enabled) {
        return h('div', { style: { padding: '2rem' } },
          h('h2', { className: 'page-title' }, 'VHS Effect \u2014 DISABLED'),
          h('div', { style: { position: 'relative', width: '100%', paddingTop: '56.25%',
            background: '#111128', border: '1px solid #1e1840', overflow: 'hidden' } },
            h('div', { style: Object.assign({}, abs, { display: 'flex', alignItems: 'center',
              justifyContent: 'center', fontFamily: '"Courier New",monospace',
              fontSize: '0.8rem', color: '#6a6080', letterSpacing: '0.2em' }) },
              '[ VHS EFFECT OFF ]')
          )
        );
      }

      // LAYER 1: vhs-edge — box-shadow only, NO backdropFilter
      var edgeShadow = 'inset 0 0 ' + edgeSize + 'px ' + Math.round(edgeSize * 0.55) + 'px ' + vigColor;

      // LAYER 3: vhs-vignette
      // Real: radial-gradient(ellipse 76% 72% at 50% 50%, transparent 20%,
      //        vigColor+'bb' 52%, vigColor+'ff' 100%) + opacity:vignetteOpacity
      // 'bb'=187/255=0.733, 'ff'=1.0
      var vigBg = 'radial-gradient(ellipse 76% 72% at 50% 50%, transparent 20%, ' +
        hexToRgba(vigColor, 0.733) + ' 52%, ' + hexToRgba(vigColor, 1.0) + ' 100%)';

      // LAYER 4 canvas — ambient glow
      // Real: globalAlpha=0.35, center=(50%,44%), stops: glowColor+a1hex at 0%, +a2hex at 40%
      // a1 = min(255, round(eff*14)), a2 = min(255, round(eff*5)), pulse=0.80+0.20*sin(t*0.018)
      var pulse = 0.80 + 0.20 * Math.sin(tick * 0.018 * Math.PI);
      var eff   = glowInt * pulse;
      var ga1   = Math.min(1.0, (0.35 * Math.min(255, Math.round(eff * 14))) / 255);
      var ga2   = Math.min(1.0, (0.35 * Math.min(255, Math.round(eff * 5)))  / 255);
      var glowBg = 'radial-gradient(ellipse 116% 58% at 50% 44%, ' +
        hexToRgba(glowCol, ga1) + ' 0%, ' + hexToRgba(glowCol, ga2) + ' 40%, transparent 100%)';

      // Scanlines
      var sp = Math.max(1, scanSpc | 0);
      var scanBg = 'repeating-linear-gradient(to bottom,transparent 0px,transparent ' +
        (sp - 1) + 'px,rgba(0,0,0,' + scanOp + ') ' + (sp - 1) + 'px,rgba(0,0,0,' + scanOp + ') ' + sp + 'px)';

      // Chromatic aberration — matches _drawChromatic()
      // zone = min(0.26, ca*0.014+0.07),  str = min(0.18, ca*0.022)
      var zone = Math.min(0.26, chromAb * 0.014 + 0.07);
      var str  = Math.min(0.18, chromAb * 0.022);
      var zp   = (zone * 100).toFixed(1), hp = (zone * 50).toFixed(1);
      var chromBg = [
        'linear-gradient(to right,  rgba(255,0,45,'  + str.toFixed(4) + ') 0%,rgba(255,0,45,'  + (str*0.4).toFixed(4) + ') ' + hp + '%,transparent ' + zp + '%)',
        'linear-gradient(to left,   rgba(0,80,255,'  + str.toFixed(4) + ') 0%,rgba(0,80,255,'  + (str*0.4).toFixed(4) + ') ' + hp + '%,transparent ' + zp + '%)',
        'linear-gradient(to bottom, rgba(180,0,255,' + (str*0.3).toFixed(4) + ') 0%,transparent 12%)'
      ].join(', ');

      // Grain (SVG feTurbulence, seed changes every ~4 ticks = ~26fps)
      var gseed = (tick * 7) % 256;
      var grainSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">' +
        '<filter id="vgn" x="0%" y="0%" width="100%" height="100%">' +
        '<feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="' + gseed + '" stitchTiles="stitch"/>' +
        '<feColorMatrix type="saturate" values="0"/>' +
        '</filter>' +
        '<rect width="100%" height="100%" filter="url(#vgn)" opacity="' + grainOp + '"/></svg>';

      // Artifacts — probabilistic, mirroring _drawArtifacts() probabilities
      var arts = [];
      if (Math.sin(tick * 0.41 + 1.1) > (1 - artOp * 2.2)) {
        arts.push(h('div', { key: 'a0', style: { position: 'absolute', left: 0, right: 0,
          top: ((Math.sin(tick * 0.57 + 1.91) * 0.5 + 0.5) * 82 + 6).toFixed(1) + '%',
          height: (Math.abs(Math.sin(tick * 0.33)) * 3.5 + 0.5).toFixed(1) + 'px',
          background: 'rgba(100,130,255,' + (artOp * 0.38).toFixed(3) + ')',
          mixBlendMode: 'screen', pointerEvents: 'none' } }));
      }
      if (Math.sin(tick * 0.73 + 2.7) > (1 - artOp * 1.5)) {
        arts.push(h('div', { key: 'a1', style: { position: 'absolute', left: 0,
          top: ((Math.sin(tick * 0.47 + 3.1) * 0.5 + 0.5) * 90 + 5).toFixed(1) + '%',
          width: ((Math.sin(tick * 0.29 + 0.8) * 0.5 + 0.5) * 55 + 25).toFixed(0) + '%',
          height: '1px',
          background: 'rgba(210,218,255,' + (artOp * 0.22).toFixed(3) + ')',
          mixBlendMode: 'screen', pointerEvents: 'none' } }));
      }
      if (Math.sin(tick * 1.13 + 5.2) > (1 - artOp * 1.2)) {
        arts.push(h('div', { key: 'a2', style: { position: 'absolute', left: 0, right: 0,
          top: ((Math.sin(tick * 0.61 + 2.4) * 0.5 + 0.5) * 88 + 6).toFixed(1) + '%',
          height: (2 + (tick % 7)) + 'px',
          background: 'rgba(50,15,170,' + (artOp * 0.16).toFixed(3) + ')',
          mixBlendMode: 'screen', pointerEvents: 'none' } }));
      }

      // Canvas-layer children (all under screen blend)
      var canvasKids = [
        h('div', { key: 'glow',  style: Object.assign({}, abs, { background: glowBg }) }),
        grainOp > 0 ? h('div', { key: 'grain', dangerouslySetInnerHTML: { __html: grainSvg }, style: Object.assign({}, abs) }) : null,
        h('div', { key: 'scan',  style: Object.assign({}, abs, { background: scanBg }) }),
        h('div', { key: 'chrom', style: Object.assign({}, abs, { background: chromBg }) })
      ].concat(arts);

      // Rolling bar (inside canvas / screen-blend layer — matches real engine)
      if (rollingBar && barActive) {
        canvasKids.push(h('div', { key: 'rbar', style: { position: 'absolute', left: 0, right: 0,
          top: barY.toFixed(1) + 'px', height: barH.toFixed(0) + 'px',
          background: 'linear-gradient(to bottom,transparent,rgba(0,0,0,' + barOp.toFixed(2) + ') 25%,rgba(0,0,0,' + barOp.toFixed(2) + ') 75%,transparent)',
          pointerEvents: 'none' } }));
        canvasKids.push(h('div', { key: 'rbar-f', style: { position: 'absolute', left: 0, right: 0,
          top: barY.toFixed(1) + 'px', height: '1.5px',
          background: 'rgba(180,200,255,' + (barOp * 0.35).toFixed(3) + ')',
          pointerEvents: 'none' } }));
      }

      // REC blink + timestamp
      canvasKids.push(h('div', { key: 'rec', style: { position: 'absolute', bottom: '0.5rem', right: '0.65rem',
        fontFamily: '"Courier New",monospace', fontSize: '0.6rem',
        color: tick % 10 < 5 ? 'rgba(255,60,60,0.9)' : 'rgba(255,60,60,0.15)',
        letterSpacing: '0.12em', userSelect: 'none' } }, '\u25cf REC'));
      canvasKids.push(h('div', { key: 'ts', style: { position: 'absolute', bottom: '0.5rem', left: '0.65rem',
        fontFamily: '"Courier New",monospace', fontSize: '0.58rem',
        color: 'rgba(200,220,255,0.45)', letterSpacing: '0.06em' } },
        '00:' + String(Math.floor(tick / 10) % 60).padStart(2, '0') + ':' + String(tick % 10) + '0'));

      // Full container
      var containerStyle = { position: 'relative', width: '100%', paddingTop: '56.25%',
        overflow: 'hidden', background: '#04040c',
        border: '1px solid #1e1840', marginBottom: '0.8rem' };

      var kids = [
        // Base photo — no opacity modification (real engine never touches image opacity)
        h('img', { key: 'img', src: sampleImg, alt: 'preview',
          style: Object.assign({}, abs, { width: '100%', height: '100%', objectFit: 'cover', display: 'block' }) }),
        // vhs-edge: box-shadow only, no backdropFilter
        h('div', { key: 'edge', style: Object.assign({}, abs, { boxShadow: edgeShadow }) }),
        // vhs-tint: flat color, opacity only — NO mixBlendMode
        h('div', { key: 'tint', style: Object.assign({}, abs, { background: overCol, opacity: overOp }) }),
        // vhs-vignette: radial gradient + vignetteOpacity
        h('div', { key: 'vig',  style: Object.assign({}, abs, { background: vigBg, opacity: vigOp }) }),
        // vhs-canvas equivalent: screen blend, all effects inside
        h('div', { key: 'cvs', style: Object.assign({}, abs, { mixBlendMode: 'screen' }) }, canvasKids)
      ];

      var pS = { color: '#7755ff', fontSize: '0.72rem', fontFamily: '"Courier New",monospace' };
      var dS = { color: '#6a6080', fontSize: '0.72rem', fontFamily: '"Courier New",monospace' };
      var oo = function(v) { return h('span', { style: { color: v ? '#55ff99' : '#6a6080',
        fontFamily: '"Courier New",monospace', fontSize: '0.72rem' } }, v ? 'ON' : 'OFF'); };

      return h('div', null,
        h('h2', { className: 'page-title' }, 'VHS Effect \u2014 Live Preview'),
        h('div', { style: containerStyle }, kids),
        h('div', { style: { lineHeight: 2.2, marginTop: '0.5rem' } },
          h('span', { style: dS }, 'Vignette '),      h('span', { style: pS }, vigOp.toFixed(2)),
          h('span', { style: dS }, '  \xb7  Overlay '), h('span', { style: pS }, overOp.toFixed(2)),
          h('span', { style: dS }, '  \xb7  Grain '),   h('span', { style: pS }, grainOp.toFixed(3)),
          h('br', null),
          h('span', { style: dS }, 'Glow '),           h('span', { style: pS }, glowInt.toFixed(2)),
          h('span', { style: dS }, '  \xb7  Chroma '), h('span', { style: pS }, chromAb.toFixed(1)),
          h('span', { style: dS }, '  \xb7  Scan '),   h('span', { style: pS }, scanOp.toFixed(2)),
          h('span', { style: dS }, '  \xb7  Artifacts '), h('span', { style: pS }, artOp.toFixed(2)),
          h('br', null),
          h('span', { style: dS }, 'Rolling Bar '), oo(rollingBar),
          h('span', { style: dS }, '  \xb7  Edge '), h('span', { style: pS }, edgeSize + 'px')
        )
      );
    }
  });
  CMS.registerPreviewTemplate('visual', VHSPreview);
  CMS.registerPreviewTemplate('visual_params', VHSPreview);

  // ── Exhibition Preview ────────────────────────
  var ExhibitionPreview = createClass({
    render: function() {
      var entry = this.props.entry;
      var list  = entry.getIn(['data', 'exhibition']);
      if (!list) return h('div', { style: { padding: '2rem', color: '#6a6080', fontFamily: 'monospace', fontSize: '0.8rem' } }, 'No exhibition items yet.');
      var items = list.toJS ? list.toJS() : [];
      return h('div', null,
        items.map(function(e, i) {
          var subpages = e.subpages || [];
          return h('div', { key: i, style: {
            display: 'grid', gridTemplateColumns: 'minmax(160px,260px) 1fr',
            gap: '2rem', alignItems: 'start',
            marginBottom: '2.5rem', paddingBottom: '2.5rem',
            borderBottom: '1px solid rgba(120,100,200,0.15)'
          }},
            e.image ? h('img', {
              src: e.image, alt: e.title || '', loading: 'lazy',
              style: { width: '100%', aspectRatio: '4/3', objectFit: 'cover', background: '#110d28' }
            }) : h('div', { style: { width: '100%', aspectRatio: '4/3', background: '#0d0820' } }),
            h('div', null,
              h('h2', { style: { fontFamily: 'Georgia,serif', fontWeight: 400, fontSize: '1.25rem', color: '#eee8ff', margin: '0 0 0.4rem' } }, e.title || ''),
              h('div', { style: { fontFamily: 'Courier New,monospace', fontSize: '0.68rem', color: '#7755ff', letterSpacing: '0.1em', marginBottom: '0.7rem' } },
                [e.year, e.venue, e.location].filter(Boolean).join('  ·  ')),
              e.description ? h('p', { style: { color: '#c8c0e8', fontSize: '0.88rem', lineHeight: 1.7, margin: '0 0 0.8rem' } }, e.description) : null,
              subpages.length ? h('div', { style: { fontFamily: 'Courier New,monospace', fontSize: '0.7rem', color: '#7755ff', letterSpacing: '0.1em' } },
                '▸ ' + subpages.length + ' sub-page' + (subpages.length > 1 ? 's' : '') + ': ' +
                subpages.map(function(sp) { return sp.title || '(untitled)'; }).join(', ')
              ) : null
            )
          );
        })
      );
    }
  });
  CMS.registerPreviewTemplate('exhibition', ExhibitionPreview);
  CMS.registerPreviewTemplate('exhibition_data', ExhibitionPreview);

  // ── Custom Pages Preview ──────────────────────
  var CustomPagesPreview = createClass({
    render: function() {
      var entry = this.props.entry;
      var list  = entry.getIn(['data', 'customPages']);
      if (!list) return h('div', { style: { padding: '2rem', color: '#6a6080', fontFamily: 'monospace', fontSize: '0.8rem' } }, 'No custom pages yet. Add one below to create a new nav item.');
      var pages = list.toJS ? list.toJS() : [];
      if (!pages.length) return h('div', { style: { padding: '2rem', color: '#6a6080', fontFamily: 'monospace', fontSize: '0.8rem' } }, 'No custom pages yet.');
      return h('div', null,
        pages.map(function(p, i) {
          var images = p.images || [];
          return h('div', { key: i, style: {
            marginBottom: '2.5rem', paddingBottom: '2.5rem',
            borderBottom: '1px solid rgba(120,100,200,0.15)'
          }},
            h('div', { style: { display: 'flex', gap: '1rem', alignItems: 'center', marginBottom: '0.8rem' } },
              h('span', { style: { fontFamily: 'Courier New,monospace', fontSize: '0.68rem', color: '#7755ff', background: 'rgba(120,85,255,0.12)', padding: '0.2rem 0.55rem', borderRadius: '2px' } }, 'nav: ' + (p.navLabel || p.id || '?')),
              h('span', { style: { fontFamily: 'Courier New,monospace', fontSize: '0.68rem', color: '#4a4060' } }, '  /custom-page.html?id=' + (p.id || ''))
            ),
            h('h2', { style: { fontFamily: 'Georgia,serif', fontWeight: 400, fontSize: '1.4rem', color: '#eee8ff', margin: '0 0 0.8rem' } }, p.title || p.navLabel || ''),
            p.body ? h('p', { style: { color: '#c8c0e8', fontSize: '0.88rem', lineHeight: 1.7, margin: '0 0 1rem', whiteSpace: 'pre-wrap' } }, p.body.slice(0, 300) + (p.body.length > 300 ? '…' : '')) : null,
            images.length ? h('div', { style: { display: 'flex', gap: '0.7rem', flexWrap: 'wrap', marginTop: '0.5rem' } },
              images.map(function(img, j) {
                return h('img', { key: j, src: img.src || '', alt: img.caption || '', loading: 'lazy',
                  style: { width: '120px', height: '90px', objectFit: 'cover', background: '#0d0820' } });
              })
            ) : null
          );
        })
      );
    }
  });
  CMS.registerPreviewTemplate('custom_pages', CustomPagesPreview);
  CMS.registerPreviewTemplate('custom_pages_data', CustomPagesPreview);

  // ── Unsaved-changes warning ───────────────────
  // Decap CMS sets document.title when there are unsaved changes (prepends an asterisk *).
  // We watch for that and warn the user if they try to navigate away.
  (function() {
    var _dirty = false;
    var titleObserver = new MutationObserver(function() {
      _dirty = document.title.startsWith('*');
    });
    titleObserver.observe(document.querySelector('title') || document.head, { subtree: true, childList: true, characterData: true });

    window.addEventListener('beforeunload', function(e) {
      if (_dirty) {
        e.preventDefault();
        e.returnValue = '你有未儲存的變更。確定要離開嗎？\nYou have unsaved changes. Leave anyway?';
      }
    });
  })();
  </script>
</body>
