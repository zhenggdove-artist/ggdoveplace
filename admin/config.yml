backend:
  name: github
  repo: zhenggdove-artist/ggdoveplace
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: projects
    label: Works (作品)
    files:
      - label: Works Data
        name: works
        file: content/data.json
        fields:
          - label: Projects
            name: projects
            widget: list
            fields:
              - { label: ID,         name: id,         widget: number }
              - { label: Image,      name: image,      widget: image }
              - { label: Title,      name: title,      widget: string, required: false }
              - { label: Year,       name: year,       widget: string, required: false }
              - { label: Medium,     name: medium,     widget: string, required: false }
              - { label: Dimensions, name: dimensions, widget: string, required: false }

  - name: weapons
    label: Weapons (武器)
    files:
      - label: Weapons Data
        name: weapons_data
        file: content/data.json
        fields:
          - label: Weapons
            name: weapons
            widget: list
            fields:
              - { label: ID,    name: id,    widget: number }
              - { label: Image, name: image, widget: image }
              - { label: Name,  name: name,  widget: string, required: false }
              - { label: Price, name: price, widget: string, required: false }

  - name: bio
    label: Bio (簡介)
    files:
      - label: Bio Data
        name: bio_data
        file: content/data.json
        fields:
          - label: Bio
            name: bio
            widget: object
            fields:
              - { label: Name,     name: name,     widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Photo,    name: photo,    widget: image }
              - { label: Text,     name: text,     widget: text }
              - { label: CV URL,   name: cv_url,   widget: string, required: false }

  - name: contact
    label: Contact (聯絡)
    files:
      - label: Contact Data
        name: contact_data
        file: content/data.json
        fields:
          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Email,         name: email,         widget: string }
              - { label: Instagram,     name: instagram,     widget: string, required: false }
              - { label: Instagram URL, name: instagram_url, widget: string, required: false }
              - { label: Location,      name: location,      widget: string, required: false }
              - { label: Image,         name: image,         widget: image }

  - name: site_settings
    label: Site Settings (網站設定)
    files:
      - label: Settings
        name: settings
        file: content/data.json
        fields:
          - label: Site
            name: site
            widget: object
            fields:
              - { label: Title,       name: title,       widget: string }
              - { label: Subtitle,    name: subtitle,    widget: string }
              - { label: Description, name: description, widget: string }

  - name: visual
    label: Visual Style — VHS Effect (視覺效果)
    files:
      - label: VHS Visual Parameters
        name: visual_params
        file: content/visual.json
        fields:
          - label: "Enable VHS Effect"
            name: enabled
            widget: boolean
            default: true
            hint: "Turn the entire VHS/dreamlike texture effect on or off. Site color palette is handled by CSS design and is always active."
          - label: "Vignette Opacity (暈映強度)"
            name: vignetteOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.82
            hint: "Darkness of the vignette edge fade (0=none, 1=full black edges)"
          - label: "Vignette Color (暈映顏色)"
            name: vignetteColor
            widget: color
            default: "#060116"
            hint: "Color of the vignette and edge shadow. Deep purple/black recommended"
          - label: "Overlay Color (色調疊加顏色)"
            name: overlayColor
            widget: color
            default: "#0b0428"
            hint: "Color of the full-screen color tint overlay (multiply blend)"
          - label: "Overlay Opacity (色調疊加強度)"
            name: overlayOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.30
            hint: "How strong the color tint overlay is (0=none, 1=full color)"
          - label: "Edge Blur Size (邊緣模糊大小)"
            name: edgeBlurSize
            widget: number
            value_type: int
            min: 0
            max: 200
            step: 5
            default: 65
            hint: "Size of the inner box-shadow blur on screen edges in pixels"
          - label: "Grain Opacity (顆粒強度)"
            name: grainOpacity
            widget: number
            value_type: float
            min: 0
            max: 0.5
            step: 0.005
            default: 0.07
            hint: "Film grain intensity (0=none, 0.15+=heavy grain)"
          - label: "Scanlines Opacity (掃描線強度)"
            name: scanlinesOpacity
            widget: number
            value_type: float
            min: 0
            max: 0.5
            step: 0.01
            default: 0.13
            hint: "Horizontal scanline darkness (0=none, 0.3=very visible)"
          - label: "Scanlines Spacing (掃描線間距)"
            name: scanlinesSpacing
            widget: number
            value_type: int
            min: 1
            max: 10
            step: 1
            default: 3
            hint: "Pixels between each scanline (1=dense, 6=sparse)"
          - label: "Artifacts Opacity (故障效果強度)"
            name: artifactsOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.28
            hint: "Intensity of random VHS glitch bars, tracking streaks and color smears"
          - label: "Glow Intensity (光暈強度)"
            name: glowIntensity
            widget: number
            value_type: float
            min: 0
            max: 5
            step: 0.05
            default: 1.25
            hint: "Ambient center glow brightness (0=none, 3+=strong bloom)"
          - label: "Glow Color (光暈顏色)"
            name: glowColor
            widget: color
            default: "#7744ff"
            hint: "Color of the ambient radial glow effect"
          - label: "Chromatic Aberration (色差強度)"
            name: chromaticAberration
            widget: number
            value_type: float
            min: 0
            max: 8
            step: 0.1
            default: 1.8
            hint: "Red/cyan color fringe on screen edges in pixels (0=off, 4+=strong lens distortion)"
