backend:
  name: github
  repo: zhenggdove-artist/ggdoveplace
  branch: main
  base_url: https://ggdove-cms-auth.onrender.com

media_folder: images/uploads
public_folder: /ggdoveplace/images/uploads

collections:
  - name: projects
    label: Works (作品)
    files:
      - label: Works Data
        name: works
        file: content/data.json
        fields:
          - label: Projects
            name: projects
            widget: list
            fields:
              - { label: ID,         name: id,         widget: number }
              - { label: Image,      name: image,      widget: image }
              - { label: Title,      name: title,      widget: string, required: false }
              - { label: Year,       name: year,       widget: string, required: false }
              - { label: Medium,     name: medium,     widget: string, required: false }
              - { label: Dimensions, name: dimensions, widget: string, required: false }

  - name: weapons
    label: Weapons (武器)
    files:
      - label: Weapons Data
        name: weapons_data
        file: content/data.json
        fields:
          - label: Weapons
            name: weapons
            widget: list
            fields:
              - { label: ID,    name: id,    widget: number }
              - { label: Image, name: image, widget: image }
              - { label: Name,  name: name,  widget: string, required: false }
              - { label: Price, name: price, widget: string, required: false }

  - name: exhibition
    label: Exhibition (展覽)
    files:
      - label: Exhibition Data
        name: exhibition_data
        file: content/data.json
        fields:
          - label: Exhibition 展覽列表
            name: exhibition
            widget: list
            summary: "{{fields.title}} — {{fields.year}}"
            fields:
              - { label: ID,          name: id,          widget: number }
              - { label: Title 標題,   name: title,       widget: string, required: false }
              - { label: Year 年份,    name: year,        widget: string, required: false }
              - { label: Venue 場地,   name: venue,       widget: string, required: false }
              - { label: Location 地點, name: location,   widget: string, required: false }
              - { label: Image 封面圖,  name: image,       widget: image,  required: false }
              - { label: Description 簡介, name: description, widget: text, required: false }
              - label: Sub-pages 子頁面
                name: subpages
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { label: "Sub-page Title 子頁標題", name: title,  widget: string }
                  - label: "Body Content 內文"
                    name: body
                    widget: markdown
                    required: false
                  - label: "Images 圖片列表"
                    name: images
                    widget: list
                    required: false
                    fields:
                      - { label: Image, name: src,     widget: image }
                      - { label: Caption 說明, name: caption, widget: string, required: false }

  - name: custom_pages
    label: Custom Pages (自訂頁面)
    files:
      - label: Custom Pages Data
        name: custom_pages_data
        file: content/data.json
        fields:
          - label: Custom Pages 自訂頁面
            name: customPages
            widget: list
            summary: "{{fields.navLabel}} ({{fields.id}})"
            fields:
              - { label: "ID (slug, 英文小寫+連字號)", name: id,       widget: string }
              - { label: "Nav Label 導航文字",         name: navLabel, widget: string }
              - { label: "Page Title 頁面標題",         name: title,    widget: string, required: false }
              - label: "Body Content 內文"
                name: body
                widget: markdown
                required: false
              - label: "Images 圖片列表"
                name: images
                widget: list
                required: false
                fields:
                  - { label: Image, name: src,     widget: image }
                  - { label: Caption 說明, name: caption, widget: string, required: false }

  - name: bio
    label: Bio (簡介)
    files:
      - label: Bio Data
        name: bio_data
        file: content/data.json
        fields:
          - label: Bio
            name: bio
            widget: object
            fields:
              - { label: Name,     name: name,     widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Photo,    name: photo,    widget: image }
              - { label: Text,     name: text,     widget: text }
              - { label: CV URL,   name: cv_url,   widget: string, required: false }

  - name: contact
    label: Contact (聯絡)
    files:
      - label: Contact Data
        name: contact_data
        file: content/data.json
        fields:
          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Email,         name: email,         widget: string }
              - { label: Instagram,     name: instagram,     widget: string, required: false }
              - { label: Instagram URL, name: instagram_url, widget: string, required: false }
              - { label: Location,      name: location,      widget: string, required: false }
              - { label: Image,         name: image,         widget: image }

  - name: site_settings
    label: Site Settings (網站設定)
    files:
      - label: Settings
        name: settings
        file: content/data.json
        fields:
          - label: Site
            name: site
            widget: object
            fields:
              - { label: Title,       name: title,       widget: string }
              - { label: Subtitle,    name: subtitle,    widget: string }
              - { label: Description, name: description, widget: string }
              - label: "Gallery Layout (作品頁版型)"
                name: galleryLayout
                widget: select
                options:
                  - { label: "Grid 方格（固定比例）", value: "grid" }
                  - { label: "Masonry 瀑布流（原始比例）", value: "masonry" }
                  - { label: "Slideshow 幻燈片（一次一張）", value: "slideshow" }
                default: "grid"
                hint: "選擇 Works 作品頁的圖片排列方式"
              - label: "Image Size (圖片大小)"
                name: imageSize
                widget: select
                options:
                  - { label: "Small 小（160px）", value: "small" }
                  - { label: "Medium 中（280px）", value: "medium" }
                  - { label: "Large 大（420px）", value: "large" }
                default: "medium"
                hint: "每張圖片的最小寬度，影響一行可以放幾張"
              - label: "Caption 字幕位置"
                name: captionStyle
                widget: select
                options:
                  - { label: "Below 下方", value: "below" }
                  - { label: "Overlay 疊加（hover 才顯示）", value: "overlay" }
                  - { label: "Hidden 隱藏", value: "hidden" }
                default: "below"
                hint: "作品標題與年份的顯示位置"
              - label: "Image Aspect 圖片比例"
                name: imageAspect
                widget: select
                options:
                  - { label: "4:3 橫向（預設）", value: "4/3" }
                  - { label: "1:1 正方形", value: "1/1" }
                  - { label: "16:9 電影比例", value: "16/9" }
                  - { label: "3:4 直向", value: "3/4" }
                  - { label: "Free 原始比例", value: "free" }
                default: "4/3"
              - label: "Gallery Gap 圖片間距"
                name: galleryGap
                widget: select
                options:
                  - { label: "Tight 密（0.5rem）", value: "tight" }
                  - { label: "Normal 中（1.8rem）", value: "normal" }
                  - { label: "Wide 疏（3rem）", value: "wide" }
                default: "normal"
              - label: "Hover Effect 滑鼠效果"
                name: hoverEffect
                widget: select
                options:
                  - { label: "Scale 放大", value: "scale" }
                  - { label: "Brighten 增亮", value: "brighten" }
                  - { label: "Glow 邊框發光", value: "glow" }
                  - { label: "None 無", value: "none" }
                default: "scale"
              - label: "字型 Typography"
                name: fonts
                widget: object
                collapsed: true
                fields:
                  - label: "標題字型 Heading Font"
                    name: heading
                    widget: select
                    options:
                      - { label: "Georgia（典雅·系統內建）", value: "georgia" }
                      - { label: "Playfair Display（奢華）", value: "playfair" }
                      - { label: "Cormorant Garamond（極細緻）", value: "cormorant" }
                      - { label: "EB Garamond（古典）", value: "garamond" }
                      - { label: "Lora（現代古典）", value: "lora" }
                      - { label: "Libre Baskerville（清晰）", value: "baskerville" }
                    default: "georgia"
                    hint: "作品標題 / 頁面標題 / 姓名使用的字型"
                  - label: "裝飾字型 Accent / Mono"
                    name: accent
                    widget: select
                    options:
                      - { label: "Courier New（系統內建）", value: "courier-new" }
                      - { label: "Space Mono（科技感）", value: "space-mono" }
                      - { label: "IBM Plex Mono（精緻）", value: "ibm-plex-mono" }
                      - { label: "Courier Prime（溫暖）", value: "courier-prime" }
                    default: "courier-new"
                    hint: "年份 / 媒材 / 標籤等輔助文字使用的字型"
              - label: "捲動動畫 Scroll Animation"
                name: scrollAnim
                widget: select
                options:
                  - { label: "None 無動畫", value: "none" }
                  - { label: "Fade Up 向上淡入 ↑", value: "fade-up" }
                  - { label: "Fade In 淡入", value: "fade-in" }
                  - { label: "Zoom In 放大淡入", value: "zoom-in" }
                  - { label: "Slide Left 左滑入 ←", value: "slide-left" }
                  - { label: "Slide Right 右滑入 →", value: "slide-right" }
                default: "fade-up"
                hint: "圖片進入畫面時的動畫效果"
              - label: "動畫速度 Animation Speed"
                name: animSpeed
                widget: select
                options:
                  - { label: "Slow 慢（0.8s）", value: "slow" }
                  - { label: "Normal 中（0.5s）", value: "normal" }
                  - { label: "Fast 快（0.3s）", value: "fast" }
                default: "normal"
              - label: "交錯進場 Stagger Effect"
                name: animStagger
                widget: boolean
                default: true
                hint: "圖片依序進場（而非全部同時出現）"
              - label: "導航文字 Nav Labels"
                name: navLabels
                widget: object
                collapsed: true
                hint: "自訂右上角導航列每一項的顯示文字（留空則使用預設英文）"
                fields:
                  - { label: "Works 頁名稱",      name: works,      widget: string, default: "Works",      required: false }
                  - { label: "Exhibition 頁名稱",  name: exhibition, widget: string, default: "Exhibition",  required: false }
                  - { label: "Weapons 頁名稱",     name: weapons,    widget: string, default: "Weapons",     required: false }
                  - { label: "Bio 頁名稱",          name: bio,        widget: string, default: "Bio",          required: false }
                  - { label: "Contact 頁名稱",     name: contact,    widget: string, default: "Contact",     required: false }
              - label: "Zalgo 崩文字效果"
                name: zalgoEffect
                widget: object
                collapsed: true
                hint: "對標題文字施加 Unicode 崩潰符文，配合 VHS 故障美學"
                fields:
                  - label: "啟用 Enabled"
                    name: enabled
                    widget: boolean
                    default: true
                    hint: "開啟後，標題文字會帶有崩潰式符文痕跡（Zalgo）"
                  - label: "套用位置 Targets（可多選）"
                    name: targets
                    widget: select
                    multiple: true
                    options:
                      - { label: "頁面大標題 Page Titles", value: "page-title" }
                      - { label: "Bio 姓名 h1", value: "bio-h1" }
                      - { label: "展覽標題 Exhibition h2", value: "exhibition-h2" }
                      - { label: "聯絡標題 Contact h2", value: "contact-h2" }
                      - { label: "Logo 左上角品牌名", value: "nav-logo" }
                      - { label: "Nav 導航連結文字", value: "nav-links" }
                    default: ["page-title", "nav-logo"]
                    hint: "可同時勾選多個位置，崩文字效果將套用在所有勾選的元素上"
                  - label: "強度 Intensity"
                    name: intensity
                    widget: number
                    value_type: float
                    min: 0.05
                    max: 1.0
                    step: 0.05
                    default: 0.3
                    hint: "0.05=輕微顫動  0.3=明顯崩潰  0.8+=完全失控"
                  - label: "向上延伸 Up Marks"
                    name: up
                    widget: boolean
                    default: true
                    hint: "字母上方的符文刺（推薦開啟，視覺最明顯）"
                  - label: "中間干擾 Mid Marks"
                    name: mid
                    widget: boolean
                    default: false
                    hint: "字母中間穿插的橫向干擾符號"
                  - label: "向下延伸 Down Marks"
                    name: down
                    widget: boolean
                    default: false
                    hint: "字母下方的符文刺（與向上同時開啟效果更混沌）"
                  - label: "刷新間隔 Refresh Interval（秒）"
                    name: interval
                    widget: number
                    value_type: float
                    min: 0.05
                    max: 30
                    step: 0.05
                    default: 2.5
                    hint: "每幾秒重新隨機化一次（0.05=極速抖動 / 0.5=快速 / 2.5=預設 / 10=緩慢）"

  - name: visual
    label: Visual Style — VHS Effect (視覺效果)
    files:
      - label: VHS Visual Parameters
        name: visual_params
        file: content/visual.json
        fields:
          - label: "Enable VHS Effect"
            name: enabled
            widget: boolean
            default: true
            hint: "Turn the entire VHS/dreamlike texture effect on or off. Site color palette is handled by CSS design and is always active."
          - label: "Vignette Opacity (暈映強度)"
            name: vignetteOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.82
            hint: "Darkness of the vignette edge fade (0=none, 1=full black edges)"
          - label: "Vignette Color (暈映顏色)"
            name: vignetteColor
            widget: color
            default: "#060116"
            hint: "Color of the vignette and edge shadow. Deep purple/black recommended"
          - label: "Overlay Color (色調疊加顏色)"
            name: overlayColor
            widget: color
            default: "#0b0428"
            hint: "Color of the full-screen color tint overlay (multiply blend)"
          - label: "Overlay Opacity (色調疊加強度)"
            name: overlayOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.30
            hint: "How strong the color tint overlay is (0=none, 1=full color)"
          - label: "Edge Blur Size (邊緣暗角大小)"
            name: edgeBlurSize
            widget: number
            value_type: int
            min: 0
            max: 200
            step: 5
            default: 70
            hint: "Size of the inner box-shadow darkness on screen edges in pixels"
          - label: "Edge Soft Focus (邊緣柔焦強度)"
            name: edgeBlurAmount
            widget: number
            value_type: int
            min: 0
            max: 20
            step: 1
            default: 7
            hint: "Backdrop blur radius for edge soft-focus effect in px (0=off, 10+=strong dream blur). Does NOT affect image colors."
          - label: "Rolling Bar / VHS Tracking (磁帶追蹤條)"
            name: rollingBarEnabled
            widget: boolean
            default: true
            hint: "Periodically shows a rolling dark band scrolling down the screen — simulates VHS tape tracking issues"
          - label: "Grain Opacity (顆粒強度)"
            name: grainOpacity
            widget: number
            value_type: float
            min: 0
            max: 0.5
            step: 0.005
            default: 0.07
            hint: "Film grain intensity (0=none, 0.15+=heavy grain)"
          - label: "Scanlines Opacity (掃描線強度)"
            name: scanlinesOpacity
            widget: number
            value_type: float
            min: 0
            max: 0.5
            step: 0.01
            default: 0.13
            hint: "Horizontal scanline darkness (0=none, 0.3=very visible)"
          - label: "Scanlines Spacing (掃描線間距)"
            name: scanlinesSpacing
            widget: number
            value_type: int
            min: 1
            max: 10
            step: 1
            default: 3
            hint: "Pixels between each scanline (1=dense, 6=sparse)"
          - label: "Artifacts Opacity (故障效果強度)"
            name: artifactsOpacity
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.01
            default: 0.28
            hint: "Intensity of random VHS glitch bars, tracking streaks and color smears"
          - label: "Glow Intensity (光暈強度)"
            name: glowIntensity
            widget: number
            value_type: float
            min: 0
            max: 5
            step: 0.05
            default: 1.25
            hint: "Ambient center glow brightness (0=none, 3+=strong bloom)"
          - label: "Glow Color (光暈顏色)"
            name: glowColor
            widget: color
            default: "#7744ff"
            hint: "Color of the ambient radial glow effect"
          - label: "Chromatic Aberration (色差強度)"
            name: chromaticAberration
            widget: number
            value_type: float
            min: 0
            max: 8
            step: 0.1
            default: 1.8
            hint: "Red/cyan color fringe on screen edges in pixels (0=off, 4+=strong lens distortion)"
