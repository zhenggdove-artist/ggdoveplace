<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGdove</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Saint font for English titles ── */
    @font-face {
      font-family: 'Saint';
      src: url('fonts/saint.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body.landing-body {
      margin: 0;
      overflow: hidden;
      background: #000000;
      cursor: none;
    }

    .landing-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 900px;
    }

    /* ── Tilt container ── */
    .tilt-scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transform: rotateX(var(--tiltX, 0deg)) rotateY(var(--tiltY, 0deg));
      transition: transform 0.15s ease-out;
    }

    /* ── TV video ── */
    .landing-tv {
      position: relative;
      z-index: 2;
      width: clamp(90px, 12vw, 160px);
      height: auto;
      display: block;
      will-change: transform;
      transform: translateZ(30px);
    }

    /* ── SVG orbital curves + nav ── */
    .landing-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      transform: translateZ(0px);
    }
    .landing-svg a {
      pointer-events: all;
      cursor: none;
    }

    /* Curves — 3x thicker */
    .orbit-curve {
      fill: none;
      stroke: rgba(184, 184, 208, 0.16);
      stroke-width: 3;
      stroke-linecap: round;
    }

    /* Decorative flourish curls — 3x thicker */
    .orbit-curl {
      fill: none;
      stroke: rgba(184, 184, 208, 0.12);
      stroke-width: 2.4;
      stroke-linecap: round;
    }

    /* Traveling shimmer — 3x thicker */
    @keyframes shimmerTravel {
      0%   { stroke-dashoffset: 1400; }
      100% { stroke-dashoffset: 0; }
    }
    .orbit-shimmer {
      fill: none;
      stroke: rgba(210, 150, 150, 0.18);
      stroke-width: 3.6;
      stroke-linecap: round;
      stroke-dasharray: 50 1350;
      animation: shimmerTravel 10s linear infinite;
    }

    /* ── Navigation text — Saint font, 50% larger ── */
    .nav-label {
      font-family: 'Saint', 'Courier New', monospace;
      font-size: 19.5px;
      font-weight: normal;
      letter-spacing: 4px;
      text-transform: uppercase;
      fill: #b8b8d0;
      cursor: none;
      transition: fill 0.3s;
    }
    .nav-label:hover {
      fill: #ffffff;
    }

    /* Decorative sub-label — 50% larger */
    .nav-sub {
      font-family: 'Courier New', monospace;
      font-size: 13.5px;
      font-style: italic;
      fill: #787890;
      letter-spacing: 1px;
    }

    /* Decorative unicode ornament — 50% larger */
    .nav-ornament {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      fill: rgba(184, 184, 208, 0.35);
    }

    /* ── Dino Cursor ── */
    .dino-cursor {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      width: 48px;
      height: auto;
      opacity: 0;
      transform: translate(-24px, -24px);
      user-select: none;
      image-rendering: auto;
    }

    /* ── Subtle scanlines ── */
    .landing-scanlines {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 6px
      );
    }

    /* ── Artist name header — Saint font, 50% larger ── */
    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.8rem 2rem;
      gap: 1rem;
      cursor: none;
    }

    .ascii-deco {
      font-family: 'Courier New', monospace;
      font-size: 0.975rem;
      color: rgba(120, 120, 144, 0.4);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .landing-artist {
      font-family: 'Saint', 'Courier New', monospace;
      font-size: 1.125rem;
      letter-spacing: 0.35em;
      color: rgba(184, 184, 208, 0.7);
      white-space: nowrap;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .landing-tv { width: clamp(70px, 19vw, 110px); }
      .nav-label { font-size: 15px; letter-spacing: 2px; }
      .nav-sub { font-size: 10.5px; }
      .dino-cursor { display: none; }
      body.landing-body { cursor: auto; }
      .landing-svg a { cursor: auto; }
      .landing-header { padding: 1rem 1rem; }
      .ascii-deco { display: none; }
    }
    @media (max-width: 480px) {
      .landing-tv { width: clamp(60px, 22vw, 90px); }
      .nav-label { font-size: 13.5px; letter-spacing: 1.5px; }
    }
  </style>
</head>
<body class="landing-body">
  <div class="landing-scanlines"></div>

  <!-- Header with artist name -->
  <div class="landing-header">
    <span class="ascii-deco">o()xxxx[{:::::::::::::::::::></span>
    <span class="landing-artist">&#xFF61;&#xFF65;&#xFF9F;&#xFF65;&#x2727; GGdove &#x2727;&#xFF65;&#xFF9F;&#xFF65;&#xFF61;</span>
    <span class="ascii-deco">&lt;:::::::::::::::::::}]xxxx()o</span>
  </div>

  <!-- Dino Cursor -->
  <img id="dino-cursor" class="dino-cursor" src="images/cursor-dino.png" alt="" aria-hidden="true">

  <div class="landing-wrap">
    <div class="tilt-scene" id="tilt-scene">

      <!-- TV video -->
      <video class="landing-tv" autoplay loop muted playsinline>
        <source src="TV.webm" type="video/webm">
        <img src="TV.gif" alt="TV">
      </video>

      <!-- SVG orbital curves + navigation -->
      <svg class="landing-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">

        <!-- ═══ Curve 1: top arc (CV → RELIC) ═══ -->
        <path id="c1" class="orbit-curve"
              d="M 170,235 C 280,95 720,95 830,235"/>
        <path class="orbit-shimmer"
              d="M 170,235 C 280,95 720,95 830,235"/>
        <!-- curl at CV -->
        <path class="orbit-curl"
              d="M 170,235 C 155,252 143,244 148,228 C 153,214 168,218 170,235"/>
        <!-- curl at RELIC -->
        <path class="orbit-curl"
              d="M 830,235 C 845,218 857,226 852,242 C 847,256 832,252 830,235"/>

        <!-- ═══ Curve 2: right arc (RELIC → EXHIBITION) ═══ -->
        <path id="c2" class="orbit-curve"
              d="M 830,235 C 935,340 935,430 830,485"/>
        <path class="orbit-shimmer"
              d="M 830,235 C 935,340 935,430 830,485"
              style="animation-delay:-2.5s"/>

        <!-- ═══ Curve 3: bottom arc (EXHIBITION → PLAY) ═══ -->
        <path id="c3" class="orbit-curve"
              d="M 830,485 C 720,615 280,615 170,485"/>
        <path class="orbit-shimmer"
              d="M 830,485 C 720,615 280,615 170,485"
              style="animation-delay:-5s"/>
        <!-- curl at EXHIBITION -->
        <path class="orbit-curl"
              d="M 830,485 C 845,500 838,512 822,507 C 808,502 812,485 830,485"/>
        <!-- curl at PLAY -->
        <path class="orbit-curl"
              d="M 170,485 C 155,500 143,492 148,476 C 153,462 168,466 170,485"/>

        <!-- ═══ Curve 4: left arc (PLAY → CV) ═══ -->
        <path id="c4" class="orbit-curve"
              d="M 170,485 C 65,430 65,340 170,235"/>
        <path class="orbit-shimmer"
              d="M 170,485 C 65,430 65,340 170,235"
              style="animation-delay:-7.5s"/>

        <!-- ═══ Navigation Labels ═══ -->

        <!-- CV — top-left -->
        <a href="bio.html">
          <text class="nav-ornament" x="115" y="180">&#x2727;</text>
          <text class="nav-label" x="135" y="198">CV</text>
          <text class="nav-sub" x="115" y="218">&#x0489;&#x030D;&#x0352;&#x0357; &#x1D4AB;&#x1D4C1;&#x1D4B8;&#x1D4BB;&#x1D4BE;&#x1D4C1;&#x1D4AE;</text>
        </a>

        <!-- RELIC — top-right -->
        <a href="relic.html">
          <text class="nav-ornament" x="870" y="180" text-anchor="end">&#x2727;</text>
          <text class="nav-label" x="855" y="198" text-anchor="end">Relic</text>
          <text class="nav-sub" x="870" y="218" text-anchor="end">&#x0489;&#x030D;&#x0352; &#x1D4B2;&#x1D4C7;&#x1D4C9;&#x1D4BE;&#x1D4BB;&#x1D4B6;&#x1D4B8;&#x1D4C9;&#x1D4C8;</text>
        </a>

        <!-- EXHIBITION — bottom-right -->
        <a href="exhibition.html">
          <text class="nav-ornament" x="870" y="512" text-anchor="end">&#x2727;</text>
          <text class="nav-label" x="855" y="530" text-anchor="end">Exhibition</text>
          <text class="nav-sub" x="870" y="550" text-anchor="end">&#x0489;&#x030D;&#x0352; &#x1D4AE;&#x1D4BD;&#x1D4C4;&#x1D4CC;&#x1D4B8;&#x1D4B6;&#x1D4C8;&#x1D4AE;</text>
        </a>

        <!-- PLAY — bottom-left -->
        <a href="#">
          <text class="nav-ornament" x="115" y="512">&#x2727;</text>
          <text class="nav-label" x="135" y="530">Play</text>
          <text class="nav-sub" x="115" y="550">&#x0489;&#x030D;&#x0352; &#x1D4B2;&#x1D4B6;&#x1D4C2;&#x1D4AE;</text>
        </a>

      </svg>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // ── Load CMS data ──
    loadData().then(() => {
      applyBackground(siteData.site);
      applyNavHoverColor(siteData.site);

      // Update artist name
      const artistEl = document.querySelector('.landing-artist');
      if (artistEl && siteData.site && siteData.site.title) {
        artistEl.innerHTML = '\uFF61\uFF65\uFF9F\uFF65\u2727 ' + siteData.site.title + ' \u2727\uFF65\uFF9F\uFF65\uFF61';
      }

      // Update nav labels
      const nl = (siteData.site && siteData.site.navLabels) || {};
      const labels = document.querySelectorAll('.nav-label');
      const map = [nl.bio || 'CV', nl.works || 'Relic', nl.exhibition || 'Exhibition', 'Play'];
      labels.forEach((t, i) => { if (map[i]) t.textContent = map[i]; });
    });

    // ── 3D Tilt on mousemove ──
    (function() {
      const scene = document.getElementById('tilt-scene');
      if (!scene) return;

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const tiltY = ((e.clientX - cx) / cx) * 6;
        const tiltX = ((cy - e.clientY) / cy) * 3;
        scene.style.setProperty('--tiltY', tiltY + 'deg');
        scene.style.setProperty('--tiltX', tiltX + 'deg');
      });

      document.addEventListener('mouseleave', function() {
        scene.style.setProperty('--tiltY', '0deg');
        scene.style.setProperty('--tiltX', '0deg');
      });
    })();

    // ── Dino cursor following mouse ──
    (function() {
      const cur = document.getElementById('dino-cursor');
      if (!cur || window.innerWidth < 768) return;

      document.addEventListener('mousemove', function(e) {
        cur.style.left = e.clientX + 'px';
        cur.style.top = e.clientY + 'px';
        cur.style.opacity = '1';
      });
      document.addEventListener('mouseleave', function() { cur.style.opacity = '0'; });
      document.addEventListener('mouseenter', function() { cur.style.opacity = '1'; });
    })();
  </script>
</body>
</html>
