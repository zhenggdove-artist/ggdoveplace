<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGdove</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.landing-body {
      margin: 0;
      overflow: hidden;
      background: #000000;
      cursor: none;
    }

    .landing-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 900px;
    }

    /* ── Tilt container (like songxin.site) ── */
    .tilt-scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transform: rotateX(var(--tiltX, 0deg)) rotateY(var(--tiltY, 0deg));
      transition: transform 0.15s ease-out;
    }

    /* ── TV video — no filter, smooth playback ── */
    .landing-tv {
      position: relative;
      z-index: 2;
      width: clamp(90px, 12vw, 160px);
      height: auto;
      display: block;
      will-change: transform;
      transform: translateZ(30px);
    }

    /* ── SVG orbital curves + nav ── */
    .landing-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      transform: translateZ(0px);
    }
    .landing-svg a {
      pointer-events: all;
      cursor: none;
    }

    /* Organic curves — thin, delicate */
    .orbit-curve {
      fill: none;
      stroke: rgba(184, 184, 208, 0.16);
      stroke-width: 1;
      stroke-linecap: round;
    }

    /* Decorative flourish curls */
    .orbit-curl {
      fill: none;
      stroke: rgba(184, 184, 208, 0.12);
      stroke-width: 0.8;
      stroke-linecap: round;
    }

    /* Traveling shimmer */
    @keyframes shimmerTravel {
      0%   { stroke-dashoffset: 1400; }
      100% { stroke-dashoffset: 0; }
    }
    .orbit-shimmer {
      fill: none;
      stroke: rgba(210, 150, 150, 0.18);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-dasharray: 50 1350;
      animation: shimmerTravel 10s linear infinite;
    }

    /* ── Navigation text — songxin style ── */
    .nav-label {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      fill: #b8b8d0;
      cursor: none;
      transition: fill 0.3s;
    }
    .nav-label:hover {
      fill: #ffffff;
    }

    /* Decorative sub-label (glitch unicode) */
    .nav-sub {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      font-style: italic;
      fill: #787890;
      letter-spacing: 1px;
    }

    /* Decorative unicode ornament */
    .nav-ornament {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      fill: rgba(184, 184, 208, 0.35);
    }

    /* ── ASCII Cursor (songxin style) ── */
    .ascii-cursor {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      line-height: 1.1;
      color: #b8b8d0;
      white-space: pre;
      opacity: 0;
      transform: translate(-50%, -50%);
      text-shadow: 0 0 8px rgba(184, 184, 208, 0.3);
      user-select: none;
    }

    /* ── Subtle scanlines ── */
    .landing-scanlines {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 6px
      );
    }

    /* ── Artist name — header with sword ASCII ── */
    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.8rem 2rem;
      gap: 1rem;
      cursor: none;
    }

    .ascii-deco {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      color: rgba(120, 120, 144, 0.4);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .landing-artist {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: rgba(184, 184, 208, 0.7);
      white-space: nowrap;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .landing-tv { width: clamp(70px, 19vw, 110px); }
      .nav-label { font-size: 10px; letter-spacing: 2px; }
      .nav-sub { font-size: 7px; }
      .ascii-cursor { display: none; }
      body.landing-body { cursor: auto; }
      .landing-svg a { cursor: auto; }
      .landing-header { padding: 1rem 1rem; }
      .ascii-deco { display: none; }
    }
    @media (max-width: 480px) {
      .landing-tv { width: clamp(60px, 22vw, 90px); }
      .nav-label { font-size: 9px; letter-spacing: 1.5px; }
    }
  </style>
</head>
<body class="landing-body">
  <div class="landing-scanlines"></div>

  <!-- Header with artist name -->
  <div class="landing-header">
    <span class="ascii-deco">o()xxxx[{:::::::::::::::::::></span>
    <span class="landing-artist">&#xFF61;&#xFF65;&#xFF9F;&#xFF65;&#x2727; GGdove &#x2727;&#xFF65;&#xFF9F;&#xFF65;&#xFF61;</span>
    <span class="ascii-deco">&lt;:::::::::::::::::::}]xxxx()o</span>
  </div>

  <!-- ASCII Cursor -->
  <pre id="ascii-cursor" class="ascii-cursor" aria-hidden="true"></pre>

  <div class="landing-wrap">
    <div class="tilt-scene" id="tilt-scene">

      <!-- TV video (1.5MB vs 60MB GIF) -->
      <video class="landing-tv" autoplay loop muted playsinline>
        <source src="TV.webm" type="video/webm">
        <img src="TV.gif" alt="TV">
      </video>

      <!-- SVG orbital curves + navigation -->
      <svg class="landing-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">

        <!-- ═══ Curve 1: top arc (CV → RELIC) ═══ -->
        <path id="c1" class="orbit-curve"
              d="M 170,235 C 280,95 720,95 830,235"/>
        <path class="orbit-shimmer"
              d="M 170,235 C 280,95 720,95 830,235"/>
        <!-- curl at CV -->
        <path class="orbit-curl"
              d="M 170,235 C 155,252 143,244 148,228 C 153,214 168,218 170,235"/>
        <!-- curl at RELIC -->
        <path class="orbit-curl"
              d="M 830,235 C 845,218 857,226 852,242 C 847,256 832,252 830,235"/>

        <!-- ═══ Curve 2: right arc (RELIC → EXHIBITION) ═══ -->
        <path id="c2" class="orbit-curve"
              d="M 830,235 C 935,340 935,430 830,485"/>
        <path class="orbit-shimmer"
              d="M 830,235 C 935,340 935,430 830,485"
              style="animation-delay:-2.5s"/>

        <!-- ═══ Curve 3: bottom arc (EXHIBITION → PLAY) ═══ -->
        <path id="c3" class="orbit-curve"
              d="M 830,485 C 720,615 280,615 170,485"/>
        <path class="orbit-shimmer"
              d="M 830,485 C 720,615 280,615 170,485"
              style="animation-delay:-5s"/>
        <!-- curl at EXHIBITION -->
        <path class="orbit-curl"
              d="M 830,485 C 845,500 838,512 822,507 C 808,502 812,485 830,485"/>
        <!-- curl at PLAY -->
        <path class="orbit-curl"
              d="M 170,485 C 155,500 143,492 148,476 C 153,462 168,466 170,485"/>

        <!-- ═══ Curve 4: left arc (PLAY → CV) ═══ -->
        <path id="c4" class="orbit-curve"
              d="M 170,485 C 65,430 65,340 170,235"/>
        <path class="orbit-shimmer"
              d="M 170,485 C 65,430 65,340 170,235"
              style="animation-delay:-7.5s"/>

        <!-- ═══ Navigation Labels ═══ -->

        <!-- CV — top-left -->
        <a href="bio.html">
          <text class="nav-ornament" x="115" y="186">&#x2727;</text>
          <text class="nav-label" x="135" y="200">CV</text>
          <text class="nav-sub" x="115" y="215">&#x0489;&#x030D;&#x0352;&#x0357; &#x1D4AB;&#x1D4C1;&#x1D4B8;&#x1D4BB;&#x1D4BE;&#x1D4C1;&#x1D4AE;</text>
        </a>

        <!-- RELIC — top-right -->
        <a href="relic.html">
          <text class="nav-ornament" x="870" y="186" text-anchor="end">&#x2727;</text>
          <text class="nav-label" x="855" y="200" text-anchor="end">Relic</text>
          <text class="nav-sub" x="870" y="215" text-anchor="end">&#x0489;&#x030D;&#x0352; &#x1D4B2;&#x1D4C7;&#x1D4C9;&#x1D4BE;&#x1D4BB;&#x1D4B6;&#x1D4B8;&#x1D4C9;&#x1D4C8;</text>
        </a>

        <!-- EXHIBITION — bottom-right -->
        <a href="exhibition.html">
          <text class="nav-ornament" x="870" y="516" text-anchor="end">&#x2727;</text>
          <text class="nav-label" x="855" y="530" text-anchor="end">Exhibition</text>
          <text class="nav-sub" x="870" y="545" text-anchor="end">&#x0489;&#x030D;&#x0352; &#x1D4AE;&#x1D4BD;&#x1D4C4;&#x1D4CC;&#x1D4B8;&#x1D4B6;&#x1D4C8;&#x1D4AE;</text>
        </a>

        <!-- PLAY — bottom-left -->
        <a href="#">
          <text class="nav-ornament" x="115" y="516">&#x2727;</text>
          <text class="nav-label" x="135" y="530">Play</text>
          <text class="nav-sub" x="115" y="545">&#x0489;&#x030D;&#x0352; &#x1D4B2;&#x1D4B6;&#x1D4C2;&#x1D4AE;</text>
        </a>

      </svg>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // ── Load CMS data ──
    loadData().then(() => {
      applyBackground(siteData.site);
      applyNavHoverColor(siteData.site);

      // Update artist name
      const artistEl = document.querySelector('.landing-artist');
      if (artistEl && siteData.site && siteData.site.title) {
        artistEl.innerHTML = '\uFF61\uFF65\uFF9F\uFF65\u2727 ' + siteData.site.title + ' \u2727\uFF65\uFF9F\uFF65\uFF61';
      }

      // Update nav labels
      const nl = (siteData.site && siteData.site.navLabels) || {};
      const labels = document.querySelectorAll('.nav-label');
      const map = [nl.bio || 'CV', nl.works || 'Relic', nl.exhibition || 'Exhibition', 'Play'];
      labels.forEach((t, i) => { if (map[i]) t.textContent = map[i]; });
    });

    // ── 3D Tilt on mousemove (songxin.site style) ──
    (function() {
      const scene = document.getElementById('tilt-scene');
      if (!scene) return;

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const tiltY = ((e.clientX - cx) / cx) * 6;   // max 6 degrees
        const tiltX = ((cy - e.clientY) / cy) * 3;    // max 3 degrees
        scene.style.setProperty('--tiltY', tiltY + 'deg');
        scene.style.setProperty('--tiltX', tiltX + 'deg');
      });

      document.addEventListener('mouseleave', function() {
        scene.style.setProperty('--tiltY', '0deg');
        scene.style.setProperty('--tiltX', '0deg');
      });
    })();

    // ── ASCII Cursor with blinking eyes (songxin.site style) ──
    (function() {
      const cur = document.getElementById('ascii-cursor');
      if (!cur || window.innerWidth < 768) return;

      const frameOpen = [
        "(\\_\\_\\_/)",
        " \\* */",
        "  \\ /",
        "   \u00A4"
      ].join("\n");

      const frameBlink = [
        "(\\_\\_\\_/)",
        " \\^ ^/",
        "  \\ /",
        "   *"
      ].join("\n");

      cur.textContent = frameOpen;

      document.addEventListener('mousemove', function(e) {
        cur.style.left = e.clientX + 'px';
        cur.style.top = e.clientY + 'px';
        cur.style.opacity = '1';
      });
      document.addEventListener('mouseleave', function() { cur.style.opacity = '0'; });

      function doBlinkOnce() {
        cur.textContent = frameBlink;
        setTimeout(() => { cur.textContent = frameOpen; }, 120);
      }

      function scheduleBlink() {
        const delay = 800 + Math.random() * 1800;
        setTimeout(() => {
          if (Math.random() < 0.5) {
            doBlinkOnce();
            setTimeout(doBlinkOnce, 180);
          } else {
            doBlinkOnce();
          }
          scheduleBlink();
        }, delay);
      }

      scheduleBlink();
    })();
  </script>
</body>
</html>
