<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGdove</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Landing Page ── */
    body.landing-body {
      margin: 0;
      overflow: hidden;
      background: #04040c;
    }

    .landing-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── TV — no filter, GPU-accelerated ── */
    .landing-tv {
      position: relative;
      z-index: 2;
      width: clamp(180px, 26vw, 340px);
      height: auto;
      display: block;
      will-change: transform;
      transform: translateZ(0);
    }

    /* ── Warm glow behind TV (pure CSS, no animation on GIF) ── */
    .tv-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 420px;
      height: 420px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255,120,40,0.10) 0%,
        rgba(255,80,20,0.04) 40%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 1;
      animation: glowBreath 5s ease-in-out infinite;
    }

    @keyframes glowBreath {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }

    /* ── SVG orbital curves ── */
    .landing-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }
    .landing-svg a { pointer-events: all; }

    /* Curve styling — thin, organic, warm */
    .orbit-curve {
      fill: none;
      stroke: rgba(200, 180, 160, 0.18);
      stroke-width: 1.2;
      stroke-linecap: round;
    }

    /* Decorative flourish swirls */
    .orbit-flourish {
      fill: none;
      stroke: rgba(200, 180, 160, 0.14);
      stroke-width: 1;
      stroke-linecap: round;
    }

    /* Traveling light along curves */
    @keyframes travelLight {
      0%   { stroke-dashoffset: 1200; }
      100% { stroke-dashoffset: 0; }
    }
    .orbit-light {
      fill: none;
      stroke: rgba(255, 200, 150, 0.25);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 60 1140;
      animation: travelLight 8s linear infinite;
    }

    /* ── Navigation text ── */
    .landing-nav-text {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 5px;
      text-transform: uppercase;
      fill: rgba(234, 242, 255, 0.88);
      cursor: pointer;
      transition: fill 0.3s, filter 0.3s;
      text-decoration: none;
    }
    .landing-nav-text:hover {
      fill: #ffffff;
      filter: drop-shadow(0 0 12px rgba(255, 200, 150, 0.6));
    }

    /* ── Subtle scanlines ── */
    .landing-scanlines {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 6px
      );
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .landing-tv { width: clamp(150px, 40vw, 240px); }
      .landing-nav-text { font-size: 11px; letter-spacing: 3px; }
      .tv-glow { width: 280px; height: 280px; }
    }
    @media (max-width: 480px) {
      .landing-tv { width: clamp(130px, 50vw, 200px); }
      .landing-nav-text { font-size: 10px; letter-spacing: 2px; }
    }
  </style>
</head>
<body class="landing-body">
  <div class="landing-scanlines"></div>

  <div class="landing-wrap">
    <!-- Warm glow -->
    <div class="tv-glow"></div>

    <!-- TV GIF center — NO filters -->
    <img class="landing-tv" src="TV.gif" alt="TV">

    <!-- SVG orbital curves + navigation -->
    <svg class="landing-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Soft glow for curves -->
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ═══ Curve 1: CV (top-left) → RELIC (top-right) — top arc ═══ -->
      <path id="c1" class="orbit-curve"
            d="M 160,240 C 250,100 750,100 840,240"
            filter="url(#softGlow)"/>
      <path class="orbit-light" d="M 160,240 C 250,100 750,100 840,240"/>

      <!-- Flourish: top-left curl -->
      <path class="orbit-flourish"
            d="M 160,240 C 145,255 135,248 140,232 C 145,218 158,222 160,240"
            filter="url(#softGlow)"/>

      <!-- ═══ Curve 2: RELIC (top-right) → EXHIBITION (bottom-right) — right arc ═══ -->
      <path id="c2" class="orbit-curve"
            d="M 840,240 C 940,340 940,440 840,480"
            filter="url(#softGlow)"/>
      <path class="orbit-light" d="M 840,240 C 940,340 940,440 840,480"
            style="animation-delay: -2s"/>

      <!-- Flourish: top-right curl -->
      <path class="orbit-flourish"
            d="M 840,240 C 855,225 865,232 860,248 C 855,262 842,258 840,240"
            filter="url(#softGlow)"/>

      <!-- ═══ Curve 3: EXHIBITION (bottom-right) → PLAY (bottom-left) — bottom arc ═══ -->
      <path id="c3" class="orbit-curve"
            d="M 840,480 C 750,600 250,600 160,480"
            filter="url(#softGlow)"/>
      <path class="orbit-light" d="M 840,480 C 750,600 250,600 160,480"
            style="animation-delay: -4s"/>

      <!-- Flourish: bottom-right curl -->
      <path class="orbit-flourish"
            d="M 840,480 C 855,495 848,505 832,500 C 818,495 822,478 840,480"
            filter="url(#softGlow)"/>

      <!-- ═══ Curve 4: PLAY (bottom-left) → CV (top-left) — left arc ═══ -->
      <path id="c4" class="orbit-curve"
            d="M 160,480 C 60,440 60,340 160,240"
            filter="url(#softGlow)"/>
      <path class="orbit-light" d="M 160,480 C 60,440 60,340 160,240"
            style="animation-delay: -6s"/>

      <!-- Flourish: bottom-left curl -->
      <path class="orbit-flourish"
            d="M 160,480 C 145,495 135,488 140,472 C 145,458 158,462 160,480"
            filter="url(#softGlow)"/>

      <!-- ═══ Navigation Labels ═══ -->
      <!-- CV — top-left -->
      <a href="bio.html">
        <text class="landing-nav-text" x="120" y="205" text-anchor="start">CV</text>
      </a>
      <!-- RELIC — top-right -->
      <a href="relic.html">
        <text class="landing-nav-text" x="880" y="205" text-anchor="end">Relic</text>
      </a>
      <!-- EXHIBITION — bottom-right -->
      <a href="exhibition.html">
        <text class="landing-nav-text" x="880" y="530" text-anchor="end">Exhibition</text>
      </a>
      <!-- PLAY — bottom-left -->
      <a href="#">
        <text class="landing-nav-text" x="120" y="530" text-anchor="start">Play</text>
      </a>
    </svg>
  </div>

  <script src="js/main.js"></script>
  <script>
    loadData().then(() => {
      applyBackground(siteData.site);
      applyNavHoverColor(siteData.site);

      // Update nav labels from CMS
      const nl = (siteData.site && siteData.site.navLabels) || {};
      const svg = document.querySelector('.landing-svg');
      if (!svg) return;
      const texts = svg.querySelectorAll('.landing-nav-text');
      const labels = [
        nl.bio || 'CV',
        nl.works || 'Relic',
        nl.exhibition || 'Exhibition',
        'Play'
      ];
      texts.forEach((t, i) => { if (labels[i]) t.textContent = labels[i]; });
    });
  </script>
</body>
</html>
