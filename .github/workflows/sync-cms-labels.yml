name: Sync CMS Sidebar Labels

# Runs whenever data.json is updated (e.g. after a CMS publish)
on:
  push:
    paths:
      - 'content/data.json'

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update config.yml labels from navLabels
        run: |
          python3 - << 'PYEOF'
          import json, re, sys

          with open('content/data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          site      = data.get('site', {})
          nav       = site.get('navLabels', {})
          custom    = data.get('customPages', [])

          # Map: collection name  →  (new label text, suffix in parens)
          label_map = {
              'projects': (nav.get('works',      'Works'),      '作品'),
              'weapons':  (nav.get('weapons',     'Weapons'),    '武器'),
              'exhibition': (nav.get('exhibition','Exhibition'), '展覽'),
              'bio':      (nav.get('bio',         'Bio'),        '簡介'),
              'contact':  (nav.get('contact',     'Contact'),    '聯絡'),
          }

          with open('admin/config.yml', 'r', encoding='utf-8') as f:
              cfg = f.read()

          changed = False

          for cname, (lbl, suffix) in label_map.items():
              new_label = '{} ({})'.format(lbl, suffix)
              # Match:  - name: <cname>\n    label: <anything>
              pattern = r'(- name: {}\n    label: )([^\n]+)'.format(re.escape(cname))
              def replacer(m, new_label=new_label):
                  if m.group(2) == new_label:
                      return m.group(0)
                  return m.group(1) + new_label
              new_cfg, n = re.subn(pattern, replacer, cfg)
              if n and new_cfg != cfg:
                  cfg = new_cfg
                  changed = True
                  print('Updated label for collection "{}": {}'.format(cname, new_label))

          # ── Custom pages: add/update/remove custom_pages sub-labels ──
          # We patch the label of the 'custom_pages' collection itself.
          # Individual custom pages don't have their own sidebar entries in
          # Decap CMS "files" collections, so just show a count in the label.
          cp_count = len(custom)
          if cp_count:
              cp_label_text = 'Custom Pages ({} 頁)'.format(cp_count)
          else:
              cp_label_text = 'Custom Pages (自訂頁面)'

          pattern_cp = r'(- name: custom_pages\n    label: )([^\n]+)'
          new_cfg, n = re.subn(pattern_cp,
              lambda m: m.group(1) + cp_label_text if m.group(2) != cp_label_text else m.group(0),
              cfg)
          if n and new_cfg != cfg:
              cfg = new_cfg
              changed = True
              print('Updated custom_pages label: {}'.format(cp_label_text))

          if changed:
              with open('admin/config.yml', 'w', encoding='utf-8') as f:
                  f.write(cfg)
              print('config.yml updated.')
          else:
              print('No label changes needed.')
          PYEOF

      - name: Commit updated config.yml (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add admin/config.yml
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: sync CMS sidebar labels from navLabels [skip ci]"
            git push
          fi
